name: Keep Streamlit app awake

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          curl -sSL -o /dev/null -w "HTTP %{http_code}\n" "$APP_URL"